<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddysPub Wi-Fi Portal</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        width: 340px;
        border-radius: 14px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    .sub {
        color: #666;
        font-size: 14px;
        margin-bottom: 20px;
    }

    button {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        background: #007aff;
        color: white;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .status {
        display: none;
        margin-top: 20px;
    }

    .success {
        display: none;
        margin-top: 20px;
        color: #1a7f37;
        font-weight: bold;
    }

    .spinner {
        margin: 12px auto;
        width: 22px;
        height: 22px;
        border: 3px solid #ddd;
        border-top: 3px solid #007aff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

</head>

<body>

<div class="card">
    <h1>PaddysPub Wi-Fi</h1>
    <div class="sub">Guest Network Access Portal</div>

```
<button onclick="connect()">Connect to Network</button>

<div class="status" id="status">
    <div class="spinner"></div>
    Establishing secure connection...
</div>

<div class="success" id="success">
    ✓ Connection Successful
    <div style="font-weight: normal; margin-top: 8px; color:#444;">
        Redirecting to internet...
    </div>
</div>
```

</div>

<script>
function connect() {
    document.querySelector("button").style.display = "none";
    document.getElementById("status").style.display = "block";

    setTimeout(() => {
        document.getElementById("status").style.display = "none";
        document.getElementById("success").style.display = "block";
    }, 2500);

    setTimeout(() => {
        window.location.href = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1";
    }, 4200);
}
</script>

</body>
</html>
